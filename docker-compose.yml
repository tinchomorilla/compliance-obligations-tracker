services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: compliance
      POSTGRES_PASSWORD: compliance
      POSTGRES_DB: compliance
    ports:
      - "5432:5432"
    volumes:
      - compliance_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U compliance -d compliance"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://compliance:compliance@db:5432/compliance
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  compliance_db_data:
